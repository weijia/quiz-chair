<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>逃学威龙 - 答题惩罚椅</title>
<!-- ============================================================
     逃学威龙 · 答题惩罚椅  v1.4.0
     复刻电影经典桥段的 Web 小游戏
     模式一：答题模式 - 内置/自定义题库，限时答题
     模式二：记分模式 - 自由判定对错，只做奖励/惩罚特效
     模式三：盲答模式 - 答错不显示正确答案
     数据持久化：PouchDB (IndexedDB)
     ============================================================ -->
<!-- PouchDB CDN -->
<script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
<style>
/* ==================== 全局重置 & 基础样式 ==================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --crt-green: #00ff41;
  --crt-dark: #0a0a0a;
  --gold: #ffd700;
  --danger-red: #ff1a1a;
  --electric-blue: #00bfff;
  --bg-dark: #1a1a2e;
  --bg-panel: #16213e;
  --text-yellow: #ffe066;
  --text-white: #f0f0f0;
  --font-main: "STHeiti", "Heiti SC", "Microsoft YaHei", "PingFang SC", sans-serif;
}

html, body {
  width: 100%; min-height: 100vh; overflow-x: hidden; overflow-y: auto;
  font-family: var(--font-main);
  background: var(--bg-dark); color: var(--text-white);
}

body {
  display: flex; flex-direction: column; align-items: center;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(0,255,65,0.03) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px);
  background-attachment: fixed;
}

/* CRT 扫描线 */
body::after {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
}

/* ==================== 全屏震动 ==================== */
@keyframes shake {
  0%, 100% { transform: translate(0,0) rotate(0deg); }
  10% { transform: translate(-8px,-6px) rotate(-1deg); }
  20% { transform: translate(8px,4px) rotate(1deg); }
  30% { transform: translate(-6px,8px) rotate(-0.5deg); }
  40% { transform: translate(6px,-8px) rotate(0.5deg); }
  50% { transform: translate(-8px,4px) rotate(-1deg); }
  60% { transform: translate(8px,-4px) rotate(1deg); }
  70% { transform: translate(-4px,8px) rotate(-0.5deg); }
  80% { transform: translate(4px,-6px) rotate(0.5deg); }
  90% { transform: translate(-6px,-4px) rotate(-1deg); }
}
@media (max-width: 768px) {
  @keyframes shake {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    10% { transform: translate(-4px,-3px) rotate(-0.5deg); }
    20% { transform: translate(4px,2px) rotate(0.5deg); }
    30% { transform: translate(-3px,4px) rotate(-0.3deg); }
    40% { transform: translate(3px,-4px) rotate(0.3deg); }
    50% { transform: translate(-4px,2px) rotate(-0.5deg); }
    60% { transform: translate(4px,-2px) rotate(0.5deg); }
    70% { transform: translate(-2px,4px) rotate(-0.3deg); }
    80% { transform: translate(2px,-3px) rotate(0.3deg); }
    90% { transform: translate(-3px,-2px) rotate(-0.5deg); }
  }
}
body.shaking { animation: shake 0.5s ease-in-out; }

/* 屏幕泛红 */
.screen-red-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 9998; opacity: 0; transition: opacity 0.15s;
  box-shadow: inset 0 0 120px 40px rgba(255,26,26,0.6);
}
.screen-red-overlay.active { opacity: 1; }

/* 闪电 */
.lightning-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 9997; opacity: 0;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.8) 30.5%, transparent 31%),
              linear-gradient(-45deg, transparent 60%, rgba(255,255,255,0.6) 60.5%, transparent 61%);
  background-size: 200% 200%;
}
.lightning-overlay.active { animation: lightning-flash 0.15s ease-in-out 4; }
@keyframes lightning-flash {
  0% { opacity: 0; background-position: 0% 0%; }
  25% { opacity: 0.8; background-position: 100% 100%; }
  50% { opacity: 0; background-position: 50% 50%; }
  75% { opacity: 0.6; background-position: 0% 100%; }
  100% { opacity: 0; background-position: 100% 0%; }
}

/* 粒子 */
.particles-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9996; overflow: hidden; }
.particle {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 6px rgba(255,215,0,0.6);
  animation: particle-fall 1.5s ease-in forwards;
}
@keyframes particle-fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0); }
}

/* 反馈弹出 */
.feedback-popup {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  z-index: 10000; font-size: clamp(1.5rem, 6vw, 3rem); font-weight: 900;
  text-align: center; pointer-events: none; opacity: 0;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  text-shadow: 0 4px 12px rgba(0,0,0,0.5); white-space: nowrap;
}
.feedback-popup.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
.feedback-popup.correct { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 4px 12px rgba(0,0,0,0.5); }
.feedback-popup.wrong { color: var(--danger-red); text-shadow: 0 0 20px rgba(255,26,26,0.6), 0 4px 12px rgba(0,0,0,0.5); font-size: clamp(1.8rem, 7vw, 3.5rem); }
.feedback-popup.easter-egg { color: #ff69b4; text-shadow: 0 0 20px rgba(255,105,180,0.6), 0 4px 12px rgba(0,0,0,0.5); }

/* ==================== 主容器 ==================== */
.game-container {
  width: 100%; max-width: 800px; padding: 16px;
  display: flex; flex-direction: column; align-items: center; gap: 20px; min-height: 100vh;
}

/* 标题 */
.game-title { text-align: center; padding: 16px 0 8px; }
.game-title h1 {
  font-size: clamp(1.6rem, 5vw, 2.4rem); color: var(--crt-green);
  text-shadow: 0 0 10px rgba(0,255,65,0.5), 0 0 20px rgba(0,255,65,0.3), 0 0 40px rgba(0,255,65,0.1);
  letter-spacing: 4px; font-weight: 900;
}
.game-title .subtitle { font-size: clamp(0.75rem, 2.5vw, 0.95rem); color: var(--text-yellow); margin-top: 4px; opacity: 0.8; }

/* 记分牌 */
.scoreboard {
  width: 100%; background: var(--crt-dark); border: 3px solid var(--crt-green);
  border-radius: 8px; padding: 16px 24px; display: flex; justify-content: space-around; align-items: center;
  box-shadow: 0 0 15px rgba(0,255,65,0.2), inset 0 0 30px rgba(0,255,65,0.05); position: relative; overflow: hidden;
}
.scoreboard::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, rgba(0,255,65,0.06) 0%, transparent 70%); pointer-events: none;
}
.score-item { text-align: center; z-index: 1; }
.score-item .label { font-size: clamp(0.65rem, 2vw, 0.8rem); color: rgba(0,255,65,0.7); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
.score-item .value {
  font-size: clamp(1.8rem, 6vw, 2.8rem); color: var(--crt-green); font-weight: 900;
  text-shadow: 0 0 10px rgba(0,255,65,0.6); font-variant-numeric: tabular-nums; transition: transform 0.2s, color 0.3s;
}
.score-item .value.pulse { transform: scale(1.3); color: var(--gold); }
.score-item .value.danger-pulse { transform: scale(1.3); color: var(--danger-red); }

/* 倒计时 */
.timer-section { width: 100%; text-align: center; }
.timer-display {
  display: inline-flex; align-items: center; gap: 12px;
  background: #0d0d0d; border: 2px solid #333; border-radius: 12px;
  padding: 10px 28px; box-shadow: inset 0 0 20px rgba(255,0,0,0.1);
}
.timer-icon { font-size: clamp(1.2rem, 4vw, 1.6rem); animation: bomb-pulse 1s ease-in-out infinite; }
@keyframes bomb-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.timer-value {
  font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; font-variant-numeric: tabular-nums;
  color: var(--danger-red); text-shadow: 0 0 15px rgba(255,26,26,0.5); min-width: 2ch; text-align: center;
}
.timer-value.urgent { color: #ff0000; animation: timer-flash 0.5s ease-in-out infinite; }
@keyframes timer-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* 题目 */
.question-section { width: 100%; text-align: center; }
.question-number { font-size: clamp(0.7rem, 2vw, 0.85rem); color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.question-text { font-size: clamp(1.3rem, 4.5vw, 2rem); font-weight: 700; line-height: 1.5; text-shadow: 0 2px 8px rgba(0,0,0,0.5); min-height: 2em; }

/* 选项 */
.options-section { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  width: 100%; padding: 14px 20px; font-size: clamp(1rem, 3.5vw, 1.3rem);
  font-family: var(--font-main); font-weight: 600; color: var(--text-white);
  background: linear-gradient(135deg, var(--bg-panel), #1a1a3e);
  border: 2px solid rgba(255,255,255,0.15); border-radius: 10px;
  cursor: pointer; transition: all 0.2s ease; text-align: left;
}
.option-btn:hover:not(:disabled) { border-color: var(--electric-blue); background: linear-gradient(135deg, #1a2a4e, #2a2a5e); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,191,255,0.2); }
.option-btn:disabled { cursor: not-allowed; opacity: 0.6; }
.option-btn .option-letter { display: inline-block; width: 32px; height: 32px; line-height: 32px; text-align: center; background: rgba(255,255,255,0.1); border-radius: 6px; margin-right: 12px; font-weight: 900; }
.option-btn.correct { border-color: var(--crt-green); background: linear-gradient(135deg, rgba(0,255,65,0.15), rgba(0,255,65,0.05)); box-shadow: 0 0 20px rgba(0,255,65,0.3); }
.option-btn.wrong { border-color: var(--danger-red); background: linear-gradient(135deg, rgba(255,26,26,0.15), rgba(255,26,26,0.05)); box-shadow: 0 0 20px rgba(255,26,26,0.3); }

/* 记分模式按钮 */
.score-mode-buttons { width: 100%; display: flex; gap: 16px; }
.score-judge-btn {
  flex: 1; padding: 24px 16px; font-size: clamp(1.3rem, 5vw, 2rem);
  font-family: var(--font-main); font-weight: 900; border: 3px solid;
  border-radius: 14px; cursor: pointer; transition: all 0.15s ease;
  text-align: center; user-select: none; -webkit-user-select: none; touch-action: manipulation;
}
.score-judge-btn:active { transform: scale(0.95); }
.score-judge-btn.correct-btn {
  color: #fff; background: linear-gradient(135deg, #0a4a0a, #1a6a1a); border-color: var(--crt-green);
  box-shadow: 0 0 20px rgba(0,255,65,0.2), inset 0 0 30px rgba(0,255,65,0.1);
}
.score-judge-btn.correct-btn:hover { box-shadow: 0 0 30px rgba(0,255,65,0.4); transform: translateY(-2px); }
.score-judge-btn.wrong-btn {
  color: #fff; background: linear-gradient(135deg, #4a0a0a, #6a1a1a); border-color: var(--danger-red);
  box-shadow: 0 0 20px rgba(255,26,26,0.2), inset 0 0 30px rgba(255,26,26,0.1);
}
.score-judge-btn.wrong-btn:hover { box-shadow: 0 0 30px rgba(255,26,26,0.4); transform: translateY(-2px); }
.reset-btn {
  margin-top: 8px; padding: 10px 32px; font-size: clamp(0.85rem, 3vw, 1rem);
  font-family: var(--font-main); font-weight: 600; color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.reset-btn:hover { color: var(--text-white); background: rgba(255,255,255,0.1); }
.score-mode-hint { font-size: clamp(0.8rem, 2.5vw, 0.95rem); color: rgba(255,255,255,0.4); text-align: center; line-height: 1.6; }

/* 电椅 */
.chair-section { width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px 0; position: relative; }
.chair-canvas { max-width: 100%; height: auto; }
.chair-glow {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 300px; height: 300px; border-radius: 50%; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.chair-glow.green { background: radial-gradient(circle, rgba(0,255,65,0.3) 0%, transparent 70%); opacity: 1; }
.chair-glow.red { background: radial-gradient(circle, rgba(255,26,26,0.4) 0%, transparent 70%); opacity: 1; animation: glow-pulse-red 0.3s ease-in-out 3; }
@keyframes glow-pulse-red { 0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; } }

/* ==================== 开始/结束画面 ==================== */
.screen-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
  justify-content: center; align-items: center; z-index: 10001; transition: opacity 0.5s;
  padding: 20px; overflow-y: auto;
}
/* 横屏时屏幕覆盖层支持滚动 */
@media (orientation: landscape) and (max-height: 700px) {
  .screen-overlay { justify-content: flex-start; padding-top: 40px; }
}
.screen-overlay.hidden { opacity: 0; pointer-events: none; }
.start-screen h2 { font-size: clamp(2rem, 7vw, 3.5rem); color: var(--crt-green); text-shadow: 0 0 20px rgba(0,255,65,0.5); margin-bottom: 16px; }
.start-screen p { font-size: clamp(0.9rem, 3vw, 1.1rem); color: var(--text-yellow); margin-bottom: 8px; max-width: 420px; text-align: center; line-height: 1.6; }

.mode-buttons { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; width: 100%; max-width: 360px; }
.mode-btn {
  padding: 16px 32px; font-size: clamp(1rem, 3.5vw, 1.2rem);
  font-family: var(--font-main); font-weight: 700; color: var(--bg-dark);
  border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.mode-btn:hover { transform: translateY(-2px); }
.mode-btn .mode-icon { font-size: 1.3em; display: block; margin-bottom: 4px; }
.mode-btn .mode-desc { font-size: 0.8em; font-weight: 400; opacity: 0.8; display: block; margin-top: 4px; }
.mode-btn.quiz-mode { background: var(--crt-green); box-shadow: 0 0 20px rgba(0,255,65,0.3); }
.mode-btn.quiz-mode:hover { box-shadow: 0 0 30px rgba(0,255,65,0.5); }
.mode-btn.score-mode { background: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
.mode-btn.score-mode:hover { box-shadow: 0 0 30px rgba(255,215,0,0.5); }
.mode-btn.blind-mode { background: #e040fb; color: var(--bg-dark); box-shadow: 0 0 20px rgba(224,64,251,0.3); }
.mode-btn.blind-mode:hover { box-shadow: 0 0 30px rgba(224,64,251,0.5); }

/* 底部链接按钮 */
.start-links { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }
.start-link-btn {
  padding: 10px 20px; font-size: clamp(0.85rem, 3vw, 1rem);
  font-family: var(--font-main); font-weight: 600; color: var(--text-white);
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.start-link-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }

.end-screen h2 { font-size: clamp(1.8rem, 6vw, 3rem); color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); margin-bottom: 16px; }
.end-stats { text-align: center; margin-bottom: 20px; }
.end-stats p { font-size: clamp(1rem, 3.5vw, 1.3rem); margin: 8px 0; }
.end-stats .stat-value { color: var(--crt-green); font-weight: 900; font-size: 1.2em; }

/* ==================== 模态框（导入题库 / 历史记录） ==================== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 10002;
  display: flex; justify-content: center; align-items: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  overflow-y: auto;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--bg-dark); border: 2px solid var(--crt-green);
  border-radius: 12px; padding: 24px; width: 100%; max-width: 520px;
  max-height: 80vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,255,65,0.15);
}
.modal-title {
  font-size: clamp(1.2rem, 4vw, 1.5rem); color: var(--crt-green);
  text-align: center; margin-bottom: 16px; font-weight: 700;
}
.modal-close {
  float: right; background: none; border: none; color: rgba(255,255,255,0.5);
  font-size: 1.5rem; cursor: pointer; padding: 4px 8px;
}
.modal-close:hover { color: var(--text-white); }

/* Tab 切换 */
.modal-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.modal-tab {
  flex: 1; padding: 8px; font-size: clamp(0.8rem, 2.5vw, 0.95rem);
  font-family: var(--font-main); font-weight: 600; color: var(--text-white);
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; cursor: pointer; transition: all 0.2s; text-align: center;
}
.modal-tab.active { background: rgba(0,255,65,0.15); border-color: var(--crt-green); color: var(--crt-green); }
.modal-tab-content { display: none; }
.modal-tab-content.active { display: block; }

/* 拖拽上传区域 */
.drop-zone {
  border: 2px dashed rgba(255,255,255,0.3); border-radius: 10px;
  padding: 32px 16px; text-align: center; cursor: pointer;
  transition: all 0.2s; color: rgba(255,255,255,0.5); font-size: 0.95rem;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--crt-green); background: rgba(0,255,65,0.05); color: var(--crt-green); }
.drop-zone input[type="file"] { display: none; }
.drop-zone .drop-icon { font-size: 2rem; margin-bottom: 8px; display: block; }

/* 解析预览 */
.parse-preview {
  margin-top: 12px; padding: 12px; border-radius: 8px;
  background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2);
  font-size: 0.9rem; color: var(--crt-green);
}
.parse-preview.error {
  background: rgba(255,26,26,0.05); border-color: rgba(255,26,26,0.2); color: var(--danger-red);
}

/* 手动添加表单 */
.manual-form { display: flex; flex-direction: column; gap: 10px; }
.manual-form input {
  padding: 10px 14px; font-size: clamp(0.9rem, 3vw, 1rem);
  font-family: var(--font-main); color: var(--text-white);
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; outline: none;
}
.manual-form input:focus { border-color: var(--crt-green); }
.manual-form .answer-options { display: flex; gap: 12px; align-items: center; }
.manual-form .answer-options label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 0.95rem; }
.manual-form .answer-options input[type="radio"] { accent-color: var(--crt-green); width: 18px; height: 18px; }
.manual-form .form-actions { display: flex; gap: 10px; margin-top: 4px; }
.manual-form .form-actions button {
  flex: 1; padding: 10px; font-family: var(--font-main); font-weight: 600;
  border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.btn-add-question { background: var(--crt-green); color: var(--bg-dark); }
.btn-add-question:hover { box-shadow: 0 0 15px rgba(0,255,65,0.3); }
.btn-import-start { background: var(--gold); color: var(--bg-dark); }
.btn-import-start:hover { box-shadow: 0 0 15px rgba(255,215,0,0.3); }
.btn-cancel { background: rgba(255,255,255,0.1); color: var(--text-white); }
.btn-cancel:hover { background: rgba(255,255,255,0.2); }
.manual-count { font-size: 0.85rem; color: var(--text-yellow); text-align: center; }

/* 历史记录列表 */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}
.history-item .h-mode { font-size: 0.75rem; color: var(--crt-green); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.history-item .h-title { font-size: 1rem; font-weight: 700; margin: 4px 0; }
.history-item .h-stats { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
.history-item .h-stats span { margin-right: 12px; }
.history-item .h-time { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
.history-empty { text-align: center; color: rgba(255,255,255,0.4); padding: 24px; font-size: 0.95rem; }
.history-clear {
  margin-top: 12px; padding: 8px 20px; font-size: 0.85rem;
  font-family: var(--font-main); color: var(--danger-red);
  background: rgba(255,26,26,0.1); border: 1px solid rgba(255,26,26,0.3);
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.history-clear:hover { background: rgba(255,26,26,0.2); }

/* 已保存题库列表 */
.bank-list { display: flex; flex-direction: column; gap: 8px; }
.bank-item {
  padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: all 0.2s;
}
.bank-item:hover { background: rgba(0,255,65,0.05); border-color: rgba(0,255,65,0.3); }
.bank-item .bank-info { flex: 1; }
.bank-item .bank-title { font-weight: 700; font-size: 1rem; }
.bank-item .bank-meta { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
.bank-item .bank-actions { display: flex; gap: 6px; }
.bank-item .bank-actions button {
  padding: 4px 10px; font-size: 0.8rem; font-family: var(--font-main);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
  background: rgba(255,255,255,0.05); color: var(--text-white); cursor: pointer;
}
.bank-item .bank-actions button:hover { background: rgba(255,255,255,0.15); }
.bank-item .bank-actions .bank-del { color: var(--danger-red); border-color: rgba(255,26,26,0.3); }
.bank-empty { text-align: center; color: rgba(255,255,255,0.4); padding: 16px; font-size: 0.9rem; }

/* 版本 */
.version-footer { width: 100%; text-align: center; padding: 12px 0 20px; font-size: 0.75rem; color: rgba(255,255,255,0.3); }

/* ==================== 响应式适配 ==================== */
@media (max-width: 480px) {
  .game-container { padding: 10px; gap: 14px; }
  .scoreboard { padding: 12px 16px; }
  .timer-display { padding: 8px 20px; }
  .option-btn { padding: 12px 16px; }
  .option-btn .option-letter { width: 28px; height: 28px; line-height: 28px; margin-right: 10px; }
  .score-judge-btn { padding: 20px 12px; font-size: clamp(1.1rem, 4.5vw, 1.6rem); }
  .mode-buttons { max-width: 300px; }
  .modal-box { padding: 16px; }
}

/* 电视大屏适配 */
@media (min-width: 1920px) {
  .game-container { max-width: 1000px; }
  .game-title h1 { font-size: 3rem; }
  .question-text { font-size: 2.5rem; }
  .option-btn { padding: 18px 24px; font-size: 1.5rem; }
  .score-judge-btn { padding: 32px 24px; font-size: 2.5rem; }
}

/* ==================== 横屏适配 (landscape) ==================== */
@media (orientation: landscape) and (max-height: 500px) {
  html, body { overflow-y: auto; }
  .game-container { gap: 4px; padding: 4px 12px; min-height: auto; overflow-y: visible; }
  .game-title { padding: 2px 0; }
  .game-title h1 { font-size: 0.9rem; letter-spacing: 1px; }
  .game-title .subtitle { font-size: 0.55rem; }
  .scoreboard { padding: 3px 10px; }
  .score-item .label { font-size: 0.45rem; margin-bottom: 1px; }
  .score-item .value { font-size: 0.9rem; }
  .timer-section { display: block; margin-bottom: 2px; }
  .timer-display { padding: 2px 10px; gap: 6px; }
  .timer-icon { font-size: 0.8rem; }
  .timer-value { font-size: 1rem; }
  .question-section { margin-bottom: 2px; }
  .question-number { font-size: 0.55rem; margin-bottom: 1px; }
  .question-text { font-size: 0.75rem; min-height: 1em; line-height: 1.2; }
  .options-section { flex-direction: row; gap: 4px; flex-wrap: wrap; }
  .option-btn { padding: 4px 8px; font-size: 0.7rem; flex: 1; min-width: 80px; }
  .option-btn .option-letter { width: 16px; height: 16px; line-height: 16px; margin-right: 4px; font-size: 0.65rem; }
  .chair-section { padding: 2px 0; }
  .chair-canvas { width: 60px; height: auto; }
  .chair-glow { width: 80px; height: 80px; }
  .version-footer { display: none; }
  .score-mode-buttons { gap: 4px; }
  .score-judge-btn { padding: 6px 4px; font-size: 0.75rem; }
  .score-mode-hint { font-size: 0.55rem; }
  .reset-btn { padding: 3px 10px; font-size: 0.65rem; }
  .fullscreen-btn, .pause-btn, .home-btn { padding: 2px 5px; font-size: 0.55rem; }
  .feedback-popup { font-size: 0.9rem; }
  .feedback-popup.wrong { font-size: 1rem; }
  .screen-overlay { overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
  .mode-select-overlay { overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
  .modal-overlay { align-items: flex-start; padding-top: 20px; overflow-y: auto; }
  .modal-box { max-height: 90vh; }
}

@media (orientation: landscape) and (min-height: 501px) and (max-height: 700px) {
  html, body { overflow-y: auto; }
  .game-container { gap: 8px; padding: 8px 16px; min-height: auto; overflow-y: visible; }
  .game-title { padding: 4px 0; }
  .game-title h1 { font-size: 1.2rem; }
  .scoreboard { padding: 6px 14px; }
  .score-item .value { font-size: 1.3rem; }
  .timer-display { padding: 4px 14px; }
  .timer-value { font-size: 1.3rem; }
  .question-text { font-size: 1rem; }
  .option-btn { padding: 8px 12px; font-size: 0.9rem; }
  .chair-section { padding: 6px 0; }
  .chair-canvas { width: 120px; height: auto; }
  .chair-glow { width: 160px; height: 160px; }
  .screen-overlay { overflow-y: auto; justify-content: flex-start; padding-top: 30px; }
  .mode-select-overlay { overflow-y: auto; justify-content: flex-start; padding-top: 30px; }
  .modal-overlay { align-items: flex-start; padding-top: 20px; overflow-y: auto; }
  .modal-box { max-height: 85vh; }
}

/* ==================== 暂停遮罩 ==================== */
.pause-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 10000;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.pause-overlay.show { opacity: 1; pointer-events: auto; }
.pause-overlay h2 {
  font-size: clamp(2rem, 7vw, 3.5rem); color: var(--crt-green);
  text-shadow: 0 0 20px rgba(0,255,65,0.5); margin-bottom: 16px;
}
.pause-overlay p { font-size: clamp(1rem, 3vw, 1.2rem); color: var(--text-yellow); margin-bottom: 8px; }
.pause-overlay .pause-timer {
  font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; color: var(--danger-red);
  text-shadow: 0 0 15px rgba(255,26,26,0.5); margin: 12px 0;
}
.pause-btn {
  position: fixed; top: 12px; right: 12px; z-index: 9995;
  padding: 6px 14px; font-size: 0.85rem; font-family: var(--font-main); font-weight: 600;
  color: var(--text-white); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.pause-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--crt-green); color: var(--crt-green); }

/* 全屏按钮 */
.fullscreen-btn {
  position: fixed; top: 12px; left: 12px; z-index: 9995;
  padding: 6px 14px; font-size: 0.85rem; font-family: var(--font-main); font-weight: 600;
  color: var(--text-white); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.fullscreen-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--crt-green); color: var(--crt-green); }

/* 模式选择弹窗 */
.mode-select-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9); z-index: 10003;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  overflow-y: auto;
}
.mode-select-overlay.show { opacity: 1; pointer-events: auto; }
.mode-select-overlay h3 {
  font-size: clamp(1.3rem, 4vw, 1.8rem); color: var(--crt-green);
  text-shadow: 0 0 15px rgba(0,255,65,0.3); margin-bottom: 8px;
}
.mode-select-overlay .bank-name {
  font-size: clamp(1rem, 3vw, 1.2rem); color: var(--text-yellow); margin-bottom: 20px;
}
.mode-select-overlay .mode-select-buttons {
  display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px;
}
.mode-select-overlay .mode-select-buttons button {
  padding: 14px 24px; font-size: clamp(1rem, 3.5vw, 1.1rem);
  font-family: var(--font-main); font-weight: 700; border: none;
  border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.mode-select-overlay .mode-select-buttons .btn-normal {
  background: var(--crt-green); color: var(--bg-dark);
  box-shadow: 0 0 15px rgba(0,255,65,0.2);
}
.mode-select-overlay .mode-select-buttons .btn-normal:hover {
  box-shadow: 0 0 25px rgba(0,255,65,0.4); transform: translateY(-2px);
}
.mode-select-overlay .mode-select-buttons .btn-blind {
  background: #e040fb; color: var(--bg-dark);
  box-shadow: 0 0 15px rgba(224,64,251,0.2);
}
.mode-select-overlay .mode-select-buttons .btn-blind:hover {
  box-shadow: 0 0 25px rgba(224,64,251,0.4); transform: translateY(-2px);
}
.mode-select-overlay .mode-select-buttons .btn-cancel {
  background: rgba(255,255,255,0.1); color: var(--text-white);
  border: 1px solid rgba(255,255,255,0.2);
}
.mode-select-overlay .mode-select-buttons .btn-cancel:hover {
  background: rgba(255,255,255,0.15);
}

/* 模式选择弹窗 - 倒计时设置 */
.timer-setting {
  margin: 12px 0; padding: 10px 14px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.timer-setting label { font-size: 0.9rem; color: var(--text-white); }
.timer-setting input[type="number"] {
  width: 60px; padding: 6px 8px; font-size: 1rem; font-family: var(--font-main);
  color: var(--text-white); background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
  text-align: center; outline: none;
}
.timer-setting input[type="number"]:focus { border-color: var(--crt-green); }
.timer-setting span { font-size: 0.85rem; color: rgba(255,255,255,0.5); }

/* 返回首页按钮 */
.home-btn {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 9995;
  padding: 6px 14px; font-size: 0.85rem; font-family: var(--font-main); font-weight: 600;
  color: var(--text-white); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; cursor: pointer; transition: all 0.2s; display: none;
}
.home-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--crt-green); color: var(--crt-green); }
.home-btn.visible { display: block; }
.fullscreen-btn.home-visible { left: 12px; }
</style>
</head>
<body>

<!-- 遮罩层 -->
<div class="screen-red-overlay" id="screenRedOverlay"></div>
<div class="lightning-overlay" id="lightningOverlay"></div>
<div class="particles-container" id="particlesContainer"></div>
<div class="feedback-popup" id="feedbackPopup"></div>

<!-- 全屏按钮 -->
<button class="fullscreen-btn" id="fullscreenBtn">⛶ 全屏</button>

<!-- 返回首页按钮 -->
<button class="home-btn" id="homeBtn">🏠 首页</button>

<!-- 暂停按钮（答题模式显示） -->
<button class="pause-btn" id="pauseBtn" style="display:none;">⏸ 暂停</button>

<!-- 暂停遮罩 -->
<div class="pause-overlay" id="pauseOverlay">
  <h2>⏸ 已暂停</h2>
  <p>倒计时已暂停，点击继续</p>
  <div class="pause-timer" id="pauseTimerDisplay">15</div>
  <button class="mode-btn quiz-mode" id="resumeBtn" style="max-width:280px;width:100%;">
    <span class="mode-icon">▶ 继续答题</span>
  </button>
</div>

<!-- ==================== 开始画面 ==================== -->
<div class="screen-overlay start-screen" id="startScreen">
  <h2>⚡ 答题惩罚椅 ⚡</h2>
  <p>欢迎来到逃学威龙特别版！</p>
  <p>选择一个模式开始挑战</p>
  <div class="mode-buttons">
    <button class="mode-btn quiz-mode" id="quizModeBtn">
      <span class="mode-icon">📝 答题模式</span>
      内置题库，限时15秒答题
      <span class="mode-desc">答错就要被"电"！连续答对3题有彩蛋</span>
    </button>
    <button class="mode-btn score-mode" id="scoreModeBtn">
      <span class="mode-icon">🎯 记分模式</span>
      自由判定对错，只做特效
      <span class="mode-desc">适合老师/主持自己出题，按按钮执行惩罚</span>
    </button>
  </div>
  <div class="start-links">
    <button class="start-link-btn" id="importBtn">📎 导入自定义题库 (JSON / CSV)</button>
    <button class="start-link-btn" id="historyBtn">📊 历史记录</button>
  </div>
</div>

<!-- ==================== 结束画面 ==================== -->
<div class="screen-overlay end-screen hidden" id="endScreen">
  <h2>🏁 挑战结束！🏁</h2>
  <div class="end-stats" id="endStats"></div>
  <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px;">
    <button class="mode-btn quiz-mode" id="restartBtn" style="width:100%;">
      <span class="mode-icon">🔄 再来一次</span>
    </button>
    <button class="start-link-btn" id="endHomeBtn" style="width:100%;">🏠 返回首页</button>
  </div>
</div>

<!-- ==================== 模式选择弹窗（选择题库后弹出） ==================== -->
<div class="mode-select-overlay" id="modeSelectOverlay">
  <h3>选择答题模式</h3>
  <div class="bank-name" id="modeSelectBankName"></div>
  <div class="timer-setting">
    <label for="timerInput">⏱ 倒计时：</label>
    <input type="number" id="timerInput" value="25" min="5" max="120" step="1">
    <span>秒</span>
  </div>
  <div class="mode-select-buttons">
    <button class="btn-normal" id="modeSelectNormal">📝 普通模式（答错揭晓答案）</button>
    <button class="btn-blind" id="modeSelectBlind">🙈 盲答模式（答错不揭晓）</button>
    <button class="btn-cancel" id="modeSelectCancel">取消</button>
  </div>
</div>

<!-- ==================== 导入模态框 ==================== -->
<div class="modal-overlay" id="importModal">
  <div class="modal-box">
    <button class="modal-close" id="importClose">&times;</button>
    <div class="modal-title">📎 导入自定义题库</div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="file">文件上传</button>
      <button class="modal-tab" data-tab="paste">粘贴JSON</button>
      <button class="modal-tab" data-tab="manual">手动添加</button>
      <button class="modal-tab" data-tab="saved">已保存题库</button>
    </div>

    <!-- 文件上传 Tab -->
    <div class="modal-tab-content active" id="tabFile">
      <div class="drop-zone" id="dropZone">
        <span class="drop-icon">📁</span>
        拖拽文件到此处，或点击选择文件<br>
        <small>支持 .json / .csv 格式</small>
        <input type="file" id="fileInput" accept=".json,.csv">
      </div>
      <div id="parsePreview"></div>
      <div class="form-actions" id="fileImportActions" style="display:none; margin-top:12px; display:none; gap:10px;">
        <button class="btn-cancel" id="fileCancelBtn" style="flex:1;padding:10px;font-family:var(--font-main);border:none;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.1);color:var(--text-white);">取消</button>
        <button class="btn-import-start" id="fileStartBtn" style="flex:1;padding:10px;font-family:var(--font-main);font-weight:600;border:none;border-radius:6px;cursor:pointer;background:var(--gold);color:var(--bg-dark);">导入并开始</button>
      </div>
    </div>

    <!-- 粘贴JSON Tab -->
    <div class="modal-tab-content" id="tabPaste">
      <textarea id="jsonPasteArea" placeholder='将 JSON 内容粘贴到这里，例如：&#10;{&#10;  "title": "我的题库",&#10;  "questions": [&#10;    { "q": "1+1=?", "options": ["1","2","3"], "answer": 1 }&#10;  ]&#10;}' style="width:100%;min-height:180px;padding:12px;font-size:0.9rem;font-family:monospace,'Courier New',var(--font-main);color:var(--text-white);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);border-radius:8px;resize:vertical;outline:none;line-height:1.5;"></textarea>
      <div id="pastePreview"></div>
      <div class="form-actions" style="margin-top:12px; display:flex; gap:10px;">
        <button class="btn-cancel" id="pasteCancelBtn" style="flex:1;padding:10px;font-family:var(--font-main);border:none;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.1);color:var(--text-white);">取消</button>
        <button class="btn-import-start" id="pasteStartBtn" style="flex:1;padding:10px;font-family:var(--font-main);font-weight:600;border:none;border-radius:6px;cursor:pointer;background:var(--gold);color:var(--bg-dark);">导入并开始</button>
      </div>
    </div>

    <!-- 手动添加 Tab -->
    <div class="modal-tab-content" id="tabManual">
      <div class="manual-form" id="manualForm">
        <input type="text" id="mq" placeholder="题目内容">
        <input type="text" id="ma" placeholder="选项 A">
        <input type="text" id="mb" placeholder="选项 B">
        <input type="text" id="mc" placeholder="选项 C">
        <div class="answer-options">
          <span>正确答案：</span>
          <label><input type="radio" name="manswer" value="0" checked> A</label>
          <label><input type="radio" name="manswer" value="1"> B</label>
          <label><input type="radio" name="manswer" value="2"> C</label>
        </div>
        <button class="btn-add-question" id="addQuestionBtn">+ 添加此题</button>
        <div class="manual-count" id="manualCount">已添加 0 题</div>
      </div>
      <div class="form-actions" style="margin-top:12px; display:flex; gap:10px;">
        <button class="btn-cancel" id="manualCancelBtn" style="flex:1;padding:10px;font-family:var(--font-main);border:none;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.1);color:var(--text-white);">取消</button>
        <button class="btn-import-start" id="manualStartBtn" style="flex:1;padding:10px;font-family:var(--font-main);font-weight:600;border:none;border-radius:6px;cursor:pointer;background:var(--gold);color:var(--bg-dark);">导入并开始</button>
      </div>
    </div>

    <!-- 已保存题库 Tab -->
    <div class="modal-tab-content" id="tabSaved">
      <div class="bank-list" id="bankList"></div>
    </div>
  </div>
</div>

<!-- ==================== 历史记录模态框 ==================== -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box">
    <button class="modal-close" id="historyClose">&times;</button>
    <div class="modal-title">📊 历史记录</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- ==================== 主游戏界面 ==================== -->
<div class="game-container" id="gameContainer">
  <div class="game-title">
    <h1>逃学威龙 · 答题惩罚椅</h1>
    <div class="subtitle" id="modeSubtitle">— 经典桥段复刻 —</div>
  </div>

  <div class="scoreboard">
    <div class="score-item">
      <div class="label">连对次数</div>
      <div class="value" id="streakValue">0</div>
    </div>
    <div class="score-item" id="middleScoreItem">
      <div class="label" id="middleLabel">当前题号</div>
      <div class="value" id="middleValue">-</div>
    </div>
    <div class="score-item">
      <div class="label">惩罚次数</div>
      <div class="value" id="punishValue">0</div>
    </div>
  </div>

  <div class="timer-section" id="timerSection">
    <div class="timer-display">
      <span class="timer-icon">💣</span>
      <span class="timer-value" id="timerValue">15</span>
    </div>
  </div>

  <div class="question-section" id="questionSection">
    <div class="question-number" id="questionLabel">准备开始...</div>
    <div class="question-text" id="questionText">选择模式开始</div>
  </div>

  <div class="options-section" id="optionsSection"></div>

  <div id="scoreModeArea" style="display:none; width:100%; flex-direction:column; align-items:center; gap:16px;">
    <div class="score-mode-hint">自己出题，根据回答按下对应按钮</div>
    <div class="score-mode-buttons">
      <button class="score-judge-btn correct-btn" id="judgeCorrectBtn">✅ 正确</button>
      <button class="score-judge-btn wrong-btn" id="judgeWrongBtn">❌ 错误</button>
    </div>
    <button class="reset-btn" id="resetScoreBtn">🔄 重置记分牌</button>
  </div>

<script>
/* ================================================================
     逃学威龙 · 答题惩罚椅  v1.4.0
     - PouchDB 持久化存储

/* ==================== PouchDB 初始化 ==================== */
const DB_NAME = 'quiz_chair_db';
let db;

function initDB() {
  db = new PouchDB(DB_NAME);
}

/** 保存配置 */
async function saveConfig(config) {
  try {
    const existing = await db.get('config').catch(() => ({ _id: 'config' }));
    Object.assign(existing, config, { type: 'config' });
    await db.put(existing);
  } catch (e) { console.warn('保存配置失败:', e); }
}

/** 读取配置 */
async function loadConfig() {
  try {
    return await db.get('config');
  } catch (e) {
    return { _id: 'config', type: 'config', defaultMode: 'quiz', timerDuration: 15, lastQuizBankId: null };
  }
}

/** 保存题库 */
async function saveQuizBank(title, questions) {
  const id = 'quiz_' + title.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_') + '_' + Date.now();
  const doc = {
    _id: id, type: 'quiz_bank', title: title,
    questions: questions, createdAt: new Date().toISOString(), questionCount: questions.length
  };
  await db.put(doc);
  return doc;
}

/** 获取所有已保存题库 */
async function getAllQuizBanks() {
  const result = await db.allDocs({ startkey: 'quiz_', endkey: 'quiz_\uffff', include_docs: true });
  return result.rows.map(r => r.doc).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
}

/** 删除题库 */
async function deleteQuizBank(id) {
  try {
    const doc = await db.get(id);
    await db.remove(doc);
  } catch (e) { console.warn('删除题库失败:', e); }
}

/** 保存历史记录 */
async function saveHistory(record) {
  const id = 'history_' + Date.now();
  const doc = { _id: id, type: 'history', playedAt: new Date().toISOString(), ...record };
  await db.put(doc);
}

/** 获取所有历史记录 */
async function getAllHistory() {
  const result = await db.allDocs({ startkey: 'history_', endkey: 'history_\uffff', include_docs: true });
  return result.rows.map(r => r.doc).sort((a, b) => b.playedAt.localeCompare(a.playedAt));
}

/** 清除所有历史记录 */
async function clearHistory() {
  const docs = await getAllHistory();
  await Promise.all(docs.map(d => db.remove(d)));
}

/* ==================== 音效系统 ==================== */
const AudioSystem = {
  ctx: null,
  soundFiles: { correct: 'sounds/correct.mp3', wrong: 'sounds/wrong.mp3', timeout: 'sounds/timeout.mp3' },
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  playFile(type) {
    const a = new Audio(this.soundFiles[type]); a.volume = 0.5;
    a.play().catch(() => this.playSynth(type));
  },
  playSynth(type) {
    if (!this.ctx) return;
    const ctx = this.ctx, now = ctx.currentTime;
    if (type === 'correct') {
      [880, 1318].forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(f, now);
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        o.connect(g).connect(ctx.destination); o.start(now + i * 0.1); o.stop(now + 0.6);
      });
    } else if (type === 'wrong') {
      const bs = ctx.sampleRate * 0.8, buf = ctx.createBuffer(1, bs, ctx.sampleRate), d = buf.getChannelData(0);
      for (let i = 0; i < bs; i++) d[i] = (Math.random() * 2 - 1) * 0.4;
      const n = ctx.createBufferSource(); n.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.setValueAtTime(3000, now); flt.Q.setValueAtTime(1, now);
      const g = ctx.createGain(); g.gain.setValueAtTime(0.5, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      n.connect(flt).connect(g).connect(ctx.destination); n.start(now); n.stop(now + 0.8);
      const o = ctx.createOscillator(), og = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(80, now); o.frequency.linearRampToValueAtTime(40, now + 0.8);
      og.gain.setValueAtTime(0.2, now); og.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      o.connect(og).connect(ctx.destination); o.start(now); o.stop(now + 0.8);
    } else if (type === 'timeout') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(600, now); o.frequency.linearRampToValueAtTime(200, now + 0.6);
      g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      o.connect(g).connect(ctx.destination); o.start(now); o.stop(now + 0.6);
    }
  },
  playCorrect() { this.playFile('correct'); },
  playWrong()   { this.playFile('wrong'); },
  playTimeout() { this.playFile('timeout'); }
};

const state = {

/* ==================== 电椅绘制 ==================== */
const chairCtx = dom.chairCanvas.getContext('2d');
let chairColor = '#555';

function drawChair(color, electric) {
  const ctx = chairCtx, w = dom.chairCanvas.width, h = dom.chairCanvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#333'; ctx.fillRect(40, h - 30, w - 80, 20);
  ctx.fillStyle = color; ctx.fillRect(60, h - 60, 16, 35); ctx.fillRect(w - 76, h - 60, 16, 35);
  ctx.fillRect(50, h - 70, w - 100, 20);
  ctx.fillRect(50, 40, 16, h - 110); ctx.fillRect(w - 66, 40, 16, h - 110);
  ctx.fillRect(50, 50, w - 100, 12); ctx.fillRect(50, 90, w - 100, 12); ctx.fillRect(50, 130, w - 100, 12);
  ctx.fillStyle = electric ? '#ff4444' : '#888';
  ctx.beginPath(); ctx.arc(w / 2 - 30, 30, 14, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(w / 2 + 30, 30, 14, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = electric ? '#ff6666' : '#666'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(w / 2 - 30, 44); ctx.lineTo(w / 2 - 30, 50); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w / 2 + 30, 44); ctx.lineTo(w / 2 + 30, 50); ctx.stroke();
  ctx.fillStyle = '#aa4400';
  ctx.fillRect(66, h - 160, 50, 10); ctx.fillRect(w - 116, h - 160, 50, 10);
  ctx.fillRect(66, h - 55, 50, 8); ctx.fillRect(w - 116, h - 55, 50, 8);
  if (electric) {
    ctx.strokeStyle = '#00bfff'; ctx.lineWidth = 2; ctx.shadowColor = '#00bfff'; ctx.shadowBlur = 10;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath(); let x = w / 2 + (Math.random() - 0.5) * 120, y = 20; ctx.moveTo(x, y);
      for (let j = 0; j < 6; j++) { x += (Math.random() - 0.5) * 40; y += Math.random() * 40 + 10; ctx.lineTo(x, y); }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = electric ? '#ff0000' : '#666'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(electric ? '⚡ DANGER ⚡' : 'DANGER', w / 2, h - 8);
}
drawChair(chairColor, false);

/* ==================== 视觉特效 ==================== */
function triggerShake(d = 500) { document.body.classList.add('shaking'); setTimeout(() => document.body.classList.remove('shaking'), d); }
function triggerScreenRed() { dom.screenRedOverlay.classList.add('active'); setTimeout(() => dom.screenRedOverlay.classList.remove('active'), 800); }
function triggerLightning() { dom.lightningOverlay.classList.add('active'); setTimeout(() => dom.lightningOverlay.classList.remove('active'), 600); }
function spawnParticles(n = 30) {
  const c = dom.particlesContainer;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%'; p.style.top = '-10px';
    p.style.animationDelay = Math.random() * 0.5 + 's'; p.style.animationDuration = (1 + Math.random()) + 's';
    const s = 4 + Math.random() * 8; p.style.width = s + 'px'; p.style.height = s + 'px';
    c.appendChild(p); setTimeout(() => p.remove(), 2500);
  }
}
function showFeedback(text, type, dur = 1500) {
  const p = dom.feedbackPopup; p.textContent = text; p.className = 'feedback-popup ' + type;
  void p.offsetWidth; p.classList.add('show'); setTimeout(() => p.classList.remove('show'), dur);
}
function chairGlowGreen() {
  dom.chairGlow.className = 'chair-glow green'; chairColor = '#00cc33'; drawChair(chairColor, false);
  setTimeout(() => { dom.chairGlow.className = 'chair-glow'; chairColor = '#555'; drawChair(chairColor, false); }, 1500);
}
function chairGlowRed() {
  dom.chairGlow.className = 'chair-glow red'; chairColor = '#cc0000'; drawChair(chairColor, true);
  setTimeout(() => { dom.chairGlow.className = 'chair-glow'; chairColor = '#555'; drawChair(chairColor, false); }, 1500);
}
function pulseStreak() { const e = dom.streakValue; e.classList.add('pulse'); setTimeout(() => e.classList.remove('pulse'), 300); }
function pulsePunish() { const e = dom.punishValue; e.classList.add('danger-pulse'); setTimeout(() => e.classList.remove('danger-pulse'), 300); }

/* ==================== 共用特效 ==================== */
function triggerCorrectEffect() {
  AudioSystem.playCorrect(); state.streak++; state.correctCount++; state.totalCount++;
  if (state.streak > state.maxStreak) state.maxStreak = state.streak;
  dom.streakValue.textContent = state.streak; pulseStreak();
  chairGlowGreen(); spawnParticles(30); showFeedback('回答正确！好犀利啊！', 'correct');
  if (state.streak === 3) setTimeout(() => showFeedback('🎬 你系卧底？ 🎬', 'easter-egg', 2500), 1600);
}
function triggerWrongEffect() {
  AudioSystem.playWrong(); state.streak = 0; state.punishments++; state.totalCount++;
  dom.streakValue.textContent = state.streak; dom.punishValue.textContent = state.punishments; pulsePunish();
  triggerShake(); triggerScreenRed(); triggerLightning(); chairGlowRed();
  showFeedback('回答错误！电佢！', 'wrong');
}

/* ==================== 模式 UI 切换 ==================== */
function showQuizUI() {
  dom.timerSection.style.display = ''; dom.questionSection.style.display = '';
  dom.optionsSection.style.display = ''; dom.scoreModeArea.style.display = 'none';
  dom.middleLabel.textContent = '当前题号'; dom.middleValue.textContent = '-';
  dom.modeSubtitle.textContent = state.hideAnswer ? '— 盲答模式 · 答错不揭晓 —' : '— 经典桥段复刻 —';
  dom.pauseBtn.style.display = '';
  dom.homeBtn.classList.add('visible');
  dom.fullscreenBtn.classList.add('home-visible');
}
function showScoreUI() {
  dom.timerSection.style.display = 'none'; dom.questionSection.style.display = 'none';
  dom.optionsSection.style.display = 'none'; dom.scoreModeArea.style.display = 'flex';
  dom.middleLabel.textContent = '总判定'; dom.middleValue.textContent = '0';
  dom.modeSubtitle.textContent = '— 记分模式 · 自由判定 —';
  dom.pauseBtn.style.display = 'none';
  dom.homeBtn.classList.add('visible');
  dom.fullscreenBtn.classList.add('home-visible');
}

/* ==================== 倒计时 ==================== */
function startTimer() {
  state.timeLeft = state.timerDuration;
  dom.timerValue.textContent = state.timeLeft; dom.timerValue.classList.remove('urgent');
  state.isPaused = false;
  state.timer = setInterval(() => {
    if (state.isPaused) return;
    state.timeLeft--; dom.timerValue.textContent = Math.max(0, state.timeLeft);
    if (state.timeLeft <= 5 && state.timeLeft > 0) dom.timerValue.classList.add('urgent');
    if (state.timeLeft <= 0) { clearInterval(state.timer); handleTimeout(); }
  }, 1000);
}
function stopTimer() { if (state.timer) { clearInterval(state.timer); state.timer = null; } }

/* ==================== 答题模式 ==================== */
function loadQuestion() {
  const q = state.questions[state.currentQuestion];
  dom.questionLabel.textContent = `第 ${state.currentQuestion + 1} / ${state.totalQuestions} 题`;
  dom.middleValue.textContent = state.currentQuestion + 1;
  dom.questionText.textContent = q.q; state.isAnswered = false;

  // 随机打乱选项顺序，避免记住答案位置
  const indices = [0, 1, 2];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  // 找到正确答案在新顺序中的位置
  const shuffledOptions = indices.map(i => q.options[i]);
  const newAnswer = indices.indexOf(q.answer);
  state.currentCorrectAnswer = newAnswer;

  const letters = ['A', 'B', 'C']; dom.optionsSection.innerHTML = '';
  shuffledOptions.forEach((opt, idx) => {
    const btn = document.createElement('button'); btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[idx]}</span>${opt}`;
    btn.addEventListener('click', () => handleAnswer(idx, newAnswer));
    dom.optionsSection.appendChild(btn);
  });
  startTimer();
}

function handleAnswer(idx) {
  if (state.isAnswered || state.isProcessing) return;
  state.isAnswered = true; stopTimer();
  const btns = dom.optionsSection.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const correctIdx = state.currentCorrectAnswer;
  if (idx === correctIdx) {
    btns[correctIdx].classList.add('correct'); state.isProcessing = true;
    triggerCorrectEffect();
    showNextButton();
  } else {
    btns[idx].classList.add('wrong');
    if (!state.hideAnswer) btns[correctIdx].classList.add('correct');
    state.isProcessing = true;
    triggerWrongEffect();
    showNextButton();
  }
}

function handleTimeout() {
  if (state.isAnswered || state.isProcessing) return;
  state.isAnswered = true; AudioSystem.playTimeout();
  const btns = dom.optionsSection.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  if (!state.hideAnswer) btns[state.currentCorrectAnswer].classList.add('correct');
  state.streak = 0; state.punishments++; state.totalCount++;
  dom.streakValue.textContent = state.streak; dom.punishValue.textContent = state.punishments; pulsePunish();
  triggerShake(); triggerScreenRed(); triggerLightning(); chairGlowRed();
  showFeedback('时间到！电佢！', 'wrong');
  state.isProcessing = true; showNextButton();
}

function showNextButton() {
  // 移除已有的下一题按钮
  const existing = document.getElementById('nextQuestionBtn');
  if (existing) existing.remove();

  const btn = document.createElement('button');
  btn.id = 'nextQuestionBtn';
  btn.className = 'option-btn';
  btn.style.cssText = 'margin-top:8px; background: linear-gradient(135deg, rgba(0,255,65,0.2), rgba(0,255,65,0.1)); border-color: var(--crt-green); color: var(--crt-green); font-weight: 700;';
  btn.innerHTML = '<span class="option-letter" style="background:rgba(0,255,65,0.2);color:var(--crt-green);">▶</span>下一题';
  btn.addEventListener('click', () => {
    state.isProcessing = false;
    nextQuestion();
  });
  dom.optionsSection.appendChild(btn);
}

function nextQuestion() {
  const existing = document.getElementById('nextQuestionBtn');
  if (existing) existing.remove();
  state.currentQuestion++;
  if (state.currentQuestion >= state.totalQuestions) endGame(); else loadQuestion();
}

function startQuizMode(questions, title, bankId, hideAnswer, duration) {
  AudioSystem.init();
  state.mode = 'quiz'; state.questions = questions || [...BUILT_IN_QUESTIONS];
  state.quizBankTitle = title || '默认题库';
  state.currentQuizBankId = bankId || null;
  state.hideAnswer = !!hideAnswer;
  state.timerDuration = duration || 25;
  state.totalQuestions = state.questions.length;
  state.currentQuestion = 0; state.streak = 0; state.maxStreak = 0;
  state.punishments = 0; state.correctCount = 0; state.totalCount = 0;
  state.isAnswered = false; state.isProcessing = false;
  dom.streakValue.textContent = '0'; dom.punishValue.textContent = '0';
  dom.startScreen.classList.add('hidden'); dom.endScreen.classList.add('hidden');
  closeImportModal(); closeModeSelect();
  showQuizUI(); loadQuestion();
}

async function endGame() {
  stopTimer();
  const accuracy = state.totalQuestions > 0 ? Math.round((state.correctCount / state.totalQuestions) * 100) : 0;
  let grade = '😅 继续努力';
  if (accuracy >= 90) grade = '🏆 超级卧底！'; else if (accuracy >= 70) grade = '👍 不错不错'; else if (accuracy >= 50) grade = '😐 勉勉强强';
  dom.endStats.innerHTML = `
    <p>题库: <span class="stat-value">${state.quizBankTitle}</span></p>
    <p>总题数: <span class="stat-value">${state.totalQuestions}</span></p>
    <p>答对: <span class="stat-value">${state.correctCount}</span></p>
    <p>正确率: <span class="stat-value">${accuracy}%</span></p>
    <p>被电次数: <span class="stat-value" style="color:var(--danger-red)">${state.punishments}</span></p>
    <p>最高连对: <span class="stat-value">${state.maxStreak}</span></p>
    <p style="margin-top:12px;font-size:1.3em">${grade}</p>`;
  dom.endScreen.classList.remove('hidden');
  await saveHistory({
    mode: 'quiz', quizBankTitle: state.quizBankTitle,
    quizBankId: state.currentQuizBankId || null,
    hideAnswer: state.hideAnswer,
    timerDuration: state.timerDuration,
    totalQuestions: state.totalQuestions, correctCount: state.correctCount,
    punishments: state.punishments, maxStreak: state.maxStreak, accuracy: accuracy
  });
}

/* ==================== 记分模式 ==================== */
function startScoreMode() {
  AudioSystem.init(); state.mode = 'score';
  state.streak = 0; state.maxStreak = 0; state.punishments = 0;
  state.correctCount = 0; state.totalCount = 0; state.isProcessing = false;

  dom.startScreen.classList.add('hidden'); dom.endScreen.classList.add('hidden');
  closeImportModal(); closeModeSelect(); showScoreUI();
}

}

function judgeWrong() {
  if (state.isProcessing) return; state.isProcessing = true;

  setTimeout(() => { state.isProcessing = false; }, 2000);
}

function resetScore() {
  if (state.totalCount > 0) {
    const accuracy = state.totalCount > 0 ? Math.round((state.correctCount / state.totalCount) * 100) : 0;
    saveHistory({
      mode: 'score', quizBankTitle: '自由判定',
      totalQuestions: state.totalCount, correctCount: state.correctCount,
      punishments: state.punishments, maxStreak: state.maxStreak, accuracy: accuracy
    });
  }
  state.streak = 0; state.maxStreak = 0; state.punishments = 0;
  state.correctCount = 0; state.totalCount = 0;
  dom.streakValue.textContent = '0'; dom.punishValue.textContent = '0'; dom.middleValue.textContent = '0';

}

});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const content = e.target.result;
    const ext = file.name.split('.').pop().toLowerCase();
    try {
      if (ext === 'json') {
        parsedQuestions = parseJSON(content);
      } else if (ext === 'csv') {
        parsedQuestions = parseCSV(content);
      } else {
        throw new Error('不支持的文件格式，请使用 .json 或 .csv');
      }
      dom.parsePreview.innerHTML = `<div class="parse-preview">✅ 解析成功！共 ${parsedQuestions.length} 道题目</div>`;
      dom.fileImportActions.style.display = 'flex';
    } catch (err) {
      dom.parsePreview.innerHTML = `<div class="parse-preview error">❌ ${err.message}</div>`;
      dom.fileImportActions.style.display = 'none';
      parsedQuestions = [];
    }
  };
  reader.readAsText(file, 'UTF-8');
}

/** 解析 JSON 题库文件 */
function parseJSON(content) {
  const data = JSON.parse(content);
  const questions = data.questions || (Array.isArray(data) ? data : null);
  if (!questions || !Array.isArray(questions)) throw new Error('JSON 格式不正确：缺少 questions 数组');
  return validateQuestions(questions, data.title || '导入的题库');
}

/** 解析 CSV 题库文件 */
function parseCSV(content) {
  const lines = content.trim().split('\n');
  if (lines.length < 2) throw new Error('CSV 文件至少需要表头和一行数据');
  const questions = [];
  const answerMap = { 'A': 0, 'B': 1, 'C': 2, 'a': 0, 'b': 1, 'c': 2 };
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const parts = line.split(',');
    if (parts.length < 5) continue;
    const answerStr = parts[4].trim().toUpperCase();
    if (!(answerStr in answerMap)) continue;
    questions.push({
      q: parts[0].trim(),
      options: [parts[1].trim(), parts[2].trim(), parts[3].trim()],
      answer: answerMap[answerStr]
    });
  }
  if (questions.length === 0) throw new Error('CSV 中未找到有效题目，请检查格式');
  return validateQuestions(questions, 'CSV导入题库');
}

/** 验证题目格式 */
function validateQuestions(questions, title) {
  const valid = [];
  for (let i = 0; i < questions.length; i++) {
    const q = questions[i];
    if (!q.q || !q.options || !Array.isArray(q.options) || q.options.length < 3) {
      console.warn(`题目 ${i + 1} 格式不完整，已跳过`);
      continue;
    }
    const answer = typeof q.answer === 'string' ? { 'A': 0, 'B': 1, 'C': 2 }[q.answer.toUpperCase()] : q.answer;
    if (answer < 0 || answer > 2) {
      console.warn(`题目 ${i + 1} 答案索引无效，已跳过`);
      continue;
    }
    valid.push({ q: q.q, options: q.options.slice(0, 3), answer: answer });
  }
  if (valid.length === 0) throw new Error('未找到有效题目');
  return valid;
}

// 粘贴 JSON 导入
let pastedQuestions = [];
const pastePreview = document.getElementById('pastePreview');

function parsePastedJSON() {
  const raw = document.getElementById('jsonPasteArea').value.trim();
  if (!raw) {
    pastePreview.innerHTML = '<div class="parse-preview error">请先粘贴 JSON 内容</div>';
    pastedQuestions = [];
    return;
  }
  try {
    let jsonStr = raw;
    const codeBlockMatch = raw.match(/```(?:json)?\s*\n?([\s\S]*?)\n?```/);
    if (codeBlockMatch) jsonStr = codeBlockMatch[1].trim();
    pastedQuestions = parseJSON(jsonStr);
    pastePreview.innerHTML = `<div class="parse-preview">✅ 解析成功！共 ${pastedQuestions.length} 道题目</div>`;
  } catch (err) {
    pastePreview.innerHTML = `<div class="parse-preview error">❌ ${err.message}</div>`;
    pastedQuestions = [];
  }
}

document.getElementById('pasteStartBtn').addEventListener('click', async () => {
  parsePastedJSON();
  if (pastedQuestions.length === 0) return;
  const doc = await saveQuizBank('粘贴题库', pastedQuestions);
  closeImportModal();
  openModeSelect(doc);
});

// 已保存题库列表
async function loadSavedBanks() {
  const banks = await getAllQuizBanks();
  if (banks.length === 0) {
    dom.bankList.innerHTML = '<div class="bank-empty">暂无已保存的题库</div>';
    return;
  }
  dom.bankList.innerHTML = banks.map(bank => `
    <div class="bank-item" data-id="${bank._id}">
      <div class="bank-info">
        <div class="bank-title">${bank.title}</div>
        <div class="bank-meta">${bank.questionCount} 题 · ${new Date(bank.createdAt).toLocaleString('zh-CN')}</div>
      </div>
      <div class="bank-actions">
        <button class="bank-use" data-id="${bank._id}">使用</button>
        <button class="bank-del" data-id="${bank._id}">删除</button>
      </div>
    </div>
  `).join('');

  dom.bankList.querySelectorAll('.bank-use').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const bank = banks.find(b => b._id === btn.dataset.id);
      if (bank) { closeImportModal(); openModeSelect(bank); }
    });
  });
  dom.bankList.querySelectorAll('.bank-del').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await deleteQuizBank(btn.dataset.id);
      loadSavedBanks();
      showFeedback('题库已删除', 'wrong', 800);
    });
  });
}

async function openHistoryModal() {
  dom.historyModal.classList.add('show');
  const records = await getAllHistory();
  if (records.length === 0) {
    dom.historyList.innerHTML = '<div class="history-empty">暂无历史记录</div><button class="history-clear" style="display:none;" id="clearHistBtn">清除所有记录</button>';
    return;
  }
  dom.historyList.innerHTML = records.map((r, idx) => `
    <div class="history-item">
      <div class="h-mode">${r.mode === 'quiz' ? (r.hideAnswer ? '🙈 盲答模式' : '📝 答题模式') : '🎯 记分模式'}</div>
      <div class="h-title">${r.quizBankTitle || '未知'}</div>
      <div class="h-stats">
        <span>总${r.mode === 'quiz' ? '题数' : '判定'}: ${r.totalQuestions}</span>
        <span>正确: ${r.correctCount}</span>
        <span>正确率: ${r.accuracy}%</span>
        <span style="color:var(--danger-red)">被电: ${r.punishments}</span>
        <span>最高连对: ${r.maxStreak}</span>
      </div>
      <div class="h-time">${new Date(r.playedAt).toLocaleString('zh-CN')}</div>
      ${r.mode === 'quiz' && r.quizBankId ? `<button class="start-link-btn history-replay" data-idx="${idx}" data-bank-id="${r.quizBankId}" data-hide-answer="${!!r.hideAnswer}" data-timer="${r.timerDuration || 25}" style="margin-top:8px;width:auto;display:inline-block;padding:6px 16px;font-size:0.85rem;">🔄 再来一次</button>` : ''}
    </div>
  `).join('') + '<button class="history-clear" id="clearHistBtn">清除所有记录</button>';

  dom.historyList.querySelectorAll('.history-replay').forEach(btn => {
    btn.addEventListener('click', async () => {
      const bankId = btn.dataset.bankId;
      try {
        const bank = await db.get(bankId);
        closeHistoryModal();
        const timer = parseInt(btn.dataset.timer) || 25;
        startQuizMode(bank.questions, bank.title + ' (' + bank.questionCount + '题)', bank._id, btn.dataset.hideAnswer === 'true', timer);
      } catch (e) {
        showFeedback('题库已被删除，无法重玩', 'wrong', 1500);
      }
    });
  });

  document.getElementById('clearHistBtn').addEventListener('click', async () => {
    await clearHistory();
    openHistoryModal();
    showFeedback('历史记录已清除', 'correct', 1000);
  });
}

function closeHistoryModal() { dom.historyModal.classList.remove('show'); }

/* ==================== 暂停功能 ==================== */
function pauseGame() {
  if (state.mode !== 'quiz' || state.isAnswered || state.isPaused) return;
  state.isPaused = true;
  dom.pauseTimerDisplay.textContent = state.timeLeft;
  dom.pauseOverlay.classList.add('show');
  dom.pauseBtn.textContent = '▶ 继续';
}

function resumeGame() {
  state.isPaused = false;
  dom.pauseOverlay.classList.remove('show');
  dom.pauseBtn.textContent = '⏸ 暂停';
}

/* ==================== 全屏功能 ==================== */
function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    dom.fullscreenBtn.textContent = '⛶ 退出';
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    dom.fullscreenBtn.textContent = '⛶ 全屏';
  }
}

document.addEventListener('fullscreenchange', () => {
  dom.fullscreenBtn.textContent = document.fullscreenElement ? '⛶ 退出' : '⛶ 全屏';
});
document.addEventListener('webkitfullscreenchange', () => {
  dom.fullscreenBtn.textContent = document.webkitFullscreenElement ? '⛶ 退出' : '⛶ 全屏';
});

/* ==================== 返回首页 ==================== */
function goHome() {
  // 如果正在答题中且有进度，保存历史记录
  if (state.mode === 'quiz' && state.totalCount > 0 && state.currentQuestion > 0) {
    const accuracy = state.totalQuestions > 0 ? Math.round((state.correctCount / state.totalQuestions) * 100) : 0;
    saveHistory({
      mode: 'quiz', quizBankTitle: state.quizBankTitle + '（中途退出）',
      quizBankId: state.currentQuizBankId || null,
      hideAnswer: state.hideAnswer,
      timerDuration: state.timerDuration,
      totalQuestions: state.currentQuestion, correctCount: state.correctCount,
      punishments: state.punishments, maxStreak: state.maxStreak, accuracy: accuracy
    });
  }
  // 记分模式中途退出也保存
  if (state.mode === 'score' && state.totalCount > 0) {
    const accuracy = Math.round((state.correctCount / state.totalCount) * 100);
    saveHistory({
      mode: 'score', quizBankTitle: '自由判定（中途退出）',
      totalQuestions: state.totalCount, correctCount: state.correctCount,
      punishments: state.punishments, maxStreak: state.maxStreak, accuracy: accuracy
    });
  }

  // 重置状态
  stopTimer();
  state.mode = null;
  state.isPaused = false;
  state.isProcessing = false;
  dom.pauseOverlay.classList.remove('show');
  dom.homeBtn.classList.remove('visible');
  dom.fullscreenBtn.classList.remove('home-visible');
  dom.pauseBtn.style.display = 'none';
  dom.pauseBtn.textContent = '⏸ 暂停';
  dom.endScreen.classList.add('hidden');
  dom.startScreen.classList.remove('hidden');
  dom.optionsSection.innerHTML = '';
  dom.questionText.textContent = '选择模式开始';
  dom.questionLabel.textContent = '准备开始...';
}
