name: "Auto Deploy"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  # ==================== Job 1: 构建并部署到 WebDAV ====================
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 获取版本信息 ==========
      - name: Get version info
        id: version
        run: |
          # 设置时区为东八区
          export TZ=Asia/Shanghai

          # 判断是否为 tag 触发
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            TAG_DATE=$(git log -1 --format=%ci $TAG 2>/dev/null || date +"%Y-%m-%d %H:%M:%S")
            echo "build_time=$TAG_DATE" >> $GITHUB_OUTPUT
            echo "📦 Version: $TAG (tagged)"
          else
            # 非 tag 触发，使用时间戳作为版本标识
            TIMESTAMP=$(date +"%Y-%m-%dT%H-%M-%S")
            SHORT_SHA=${GITHUB_SHA::7}
            echo "tag=dev-${TIMESTAMP}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "build_time=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT
            echo "📦 Version: dev-${TIMESTAMP} (${SHORT_SHA})"
          fi

          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "🕐 Build Time: ${{ steps.version.outputs.build_time }}"
          echo "🔨 Commit: ${GITHUB_SHA::7}"

      # ========== 生成 version.json ==========
      - name: Generate version.json
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BUILD_TIME="${{ steps.version.outputs.build_time }}"
          COMMIT_SHA="${{ steps.version.outputs.sha }}"

          cat > version.json << EOF
          {"version":"${VERSION}","buildTime":"${BUILD_TIME}","sha":"${COMMIT_SHA}"}
          EOF

          echo "✅ Version: ${VERSION}"
          echo "🕐 Build Time: ${BUILD_TIME}"

      # ========== 清理不需要上传的文件 ==========
      - name: Clean up files before upload
        run: |
          rm -rf .git .github

      # ========== 部署到 WebDAV ==========
      # action-upload-webdav 自动判断目录：
      #   有 tag → release/ 目录（覆盖式）
      #   无 tag → 时间戳目录（新建）
      #   copy-to-latest → 同时复制到 latest/
      - name: Upload to WebDAV
        uses: weijia/action-upload-webdav@master
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/${{ github.event.repository.name }}
          source-directory: ./
          copy-to-latest: 'true'

      # ========== 部署到 GitHub Pages ==========
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  # ==================== Job 2: GitHub Pages 发布 ====================
  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
